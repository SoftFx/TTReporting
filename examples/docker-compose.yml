services:
  swap-updater:
    image: softfx/tt-reporting:latest-swap-updater
    pull_policy: always
    volumes:
      - ./swap-updater/configDocker:/app/configDocker:ro
      - ./swap-updater/dataDocker:/app/dataDocker:rw
    restart: "no"
  negative-equity:
    image: softfx/tt-reporting:latest-negative-equity
    pull_policy: always
    environment:
      MT4_PASSWORD: ${MT4_PASSWORD}
      MT5_PASSWORD: ${MT5_PASSWORD}
      PG_PASSWORD: ${PG_PASSWORD}
    volumes:
      - ./negative-equity/configDocker:/app/configDocker:ro
      - ./negative-equity/dataDocker:/app/dataDocker:rw
    restart: "no"
  big-deposits:
    image: softfx/tt-reporting:latest-big-deposits
    pull_policy: always
    volumes:
      - ./big-deposits/configDocker:/app/configDocker:ro
      - ./big-deposits/dataDocker:/app/dataDocker:rw
    restart: "no"
  big-trades:
    image: softfx/tt-reporting:latest-big-trades
    pull_policy: always
    volumes:
      - ./big-trades/configDocker:/app/configDocker:ro
      - ./big-trades/dataDocker:/app/dataDocker:rw
    restart: "no"
  count-trades:
    image: softfx/tt-reporting:latest-count-trades
    pull_policy: always
    volumes:
      - ./count-trades/configDocker:/app/configDocker:ro
      - ./count-trades/dataDocker:/app/dataDocker:rw
    restart: "no"
  diff-prices:
    image: softfx/tt-reporting:latest-diff-prices
    pull_policy: always
    volumes:
      - ./diff-prices/configDocker:/app/configDocker:ro
      - ./diff-prices/dataDocker:/app/dataDocker:rw
    restart: "no"
  aggr-data-app:
    image: softfx/tt-reporting:latest-aggr-data-app
    pull_policy: always
    environment:
      PG_PASSWORD: ${PG_PASSWORD}
    ports:
      - "3838:3838"
    volumes:
      - ./aggr-data/configDocker:/app/configDocker:ro
    restart: unless-stopped
  tt-api-lab-app:
    image: softfx/tt-reporting:latest-tt-api-lab-app
    pull_policy: always
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ./tt-api-lab/configDocker:/app/configDocker:ro
      - ./tt-api-lab/downloads:/app/downloads
  user-data-app:
    image: softfx/tt-reporting:latest-user-data-app
    pull_policy: always
    environment:
      MT4_PASSWORD: ${MT4_PASSWORD}
      MT5_PASSWORD: ${MT5_PASSWORD}
      PG_PASSWORD: ${PG_PASSWORD}
    ports:
      - "3839:3838"
    volumes:
      - ./user-data/configDocker:/app/configDocker:ro
    restart: unless-stopped



